<!-- ──────────────────────────────────────────────────────────────────────────
  admin.html

  Role-based UI example:
    • The heading always shows because only admins can reach this route (guard).
    • The "Danger Zone" card is an EXTRA example of hiding UI within the page
      using *ngIf / @if, even though the whole page is already guarded.
───────────────────────────────────────────────────────────────────────────── -->

<div class="space-y-6">

  <!-- Page header -->
  <div class="bg-white rounded-2xl shadow p-6">
    <h1 class="text-2xl font-bold text-gray-800">Admin Panel</h1>
    <p class="mt-1 text-sm text-gray-500">
      Logged in as
      <strong class="text-gray-700">{{ auth.currentUser()?.email }}</strong>
      &nbsp;·&nbsp;
      <span class="inline-block rounded bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-0.5 uppercase">
        {{ auth.currentUser()?.role }}
      </span>
    </p>
  </div>

  <!-- Stats cards (visible to all admins) -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-white rounded-xl shadow p-5 text-center">
      <p class="text-3xl font-bold text-blue-600">24</p>
      <p class="text-sm text-gray-500 mt-1">Registered users</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5 text-center">
      <p class="text-3xl font-bold text-green-600">8</p>
      <p class="text-sm text-gray-500 mt-1">Active sessions</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5 text-center">
      <p class="text-3xl font-bold text-purple-600">3</p>
      <p class="text-sm text-gray-500 mt-1">Pending requests</p>
    </div>
  </div>

  <!--
    Role-based UI: only show the "Danger Zone" block when the user's role
    is 'admin'.  Here the route guard already ensures only admins reach this
    page, so this @if is a second, in-component layer of protection.

    In a real app you might have multiple admin tiers (e.g. 'moderator' vs
    'super-admin') and use this pattern to differentiate them.
  -->
  @if (auth.getRole() === 'admin') {
    <div class="bg-white rounded-2xl shadow p-6 border-l-4 border-red-500">
      <h2 class="text-lg font-semibold text-red-700 mb-2">⚠️ Danger Zone</h2>
      <p class="text-sm text-gray-500 mb-4">
        These actions are irreversible. Only admins can see this section.
      </p>
      <div class="flex flex-wrap gap-3">
        <button
          class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white
                 hover:bg-red-700 transition-colors"
        >
          Delete all sessions
        </button>
        <button
          class="rounded-lg bg-red-100 px-4 py-2 text-sm font-semibold text-red-700
                 hover:bg-red-200 transition-colors"
        >
          Reset user database
        </button>
      </div>
    </div>
  }

</div>
